name: Check Program
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  test-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify dependencies available
        run: |
          gh --version
          jq --version

      - name: Test top-level help
        run: |
          chmod +x script.sh
          ./script.sh --help

      - name: Test version
        run: ./script.sh --version

      - name: Test unstar help
        run: ./script.sh unstar --help

      - name: Test clone-org help
        run: ./script.sh clone-org --help

      - name: Test cleanup-forks help
        run: ./script.sh cleanup-forks --help

      - name: Test cleanup-branches help
        run: ./script.sh cleanup-branches --help

      - name: Test archive-repos help
        run: ./script.sh archive-repos --help

      - name: Test repo-audit help
        run: ./script.sh repo-audit --help

      - name: Test stats help
        run: ./script.sh stats --help

      - name: Test bulk-topic help
        run: ./script.sh bulk-topic --help

      - name: Test workflow-status help
        run: ./script.sh workflow-status --help

      - name: Test sync-labels help
        run: ./script.sh sync-labels --help

      - name: Test export-stars help
        run: ./script.sh export-stars --help

      - name: Test rename-default-branch help
        run: ./script.sh rename-default-branch --help

      - name: Test secret-audit help
        run: ./script.sh secret-audit --help

      - name: Test license-check help
        run: ./script.sh license-check --help

      - name: Test dependabot-enable help
        run: ./script.sh dependabot-enable --help

      - name: Test mirror help
        run: ./script.sh mirror --help

      - name: Test release-cleanup help
        run: ./script.sh release-cleanup --help

      - name: Test unknown command fails
        run: |
          if ./script.sh nonexistent 2>/dev/null; then
            echo "Should have failed" && exit 1
          fi

      - name: Test clone-org requires --org
        run: |
          if ./script.sh clone-org --dry-run 2>/dev/null; then
            echo "Should have failed" && exit 1
          fi

      - name: Test unstar requires filter
        run: |
          if ./script.sh unstar --dry-run 2>/dev/null; then
            echo "Should have failed" && exit 1
          fi
